<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="CausalNetTwin logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#f5f3ff"/>
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="116" height="116" rx="26" fill="url(#bg)"/>
  <rect x="2" y="2" width="116" height="116" rx="26" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.5"/>

  <!-- mirror axis -->
  <line x1="60" y1="20" x2="60" y2="100" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.6" stroke-dasharray="3 5"/>

  <!-- left graph (production fabric) -->
  <g stroke="url(#edge)" stroke-width="2.4" stroke-linecap="round">
    <line x1="30" y1="40" x2="22" y2="60"/>
    <line x1="30" y1="40" x2="42" y2="52"/>
    <line x1="22" y1="60" x2="42" y2="52"/>
    <line x1="22" y1="60" x2="30" y2="82"/>
    <line x1="42" y1="52" x2="30" y2="82"/>
  </g>
  <g fill="#f8fafc">
    <circle cx="30" cy="40" r="5.4"/>
    <circle cx="22" cy="60" r="5.4"/>
    <circle cx="42" cy="52" r="5.4"/>
    <circle cx="30" cy="82" r="5.4"/>
  </g>

  <!-- right graph (counterfactual twin) -->
  <g stroke="url(#edge)" stroke-width="2.4" stroke-linecap="round" stroke-opacity="0.65">
    <line x1="90" y1="40" x2="98" y2="60"/>
    <line x1="90" y1="40" x2="78" y2="52"/>
    <line x1="98" y1="60" x2="78" y2="52"/>
    <line x1="98" y1="60" x2="90" y2="82"/>
    <line x1="78" y1="52" x2="90" y2="82"/>
  </g>
  <g fill="#f8fafc" fill-opacity="0.65">
    <circle cx="90" cy="40" r="5.4"/>
    <circle cx="98" cy="60" r="5.4"/>
    <circle cx="78" cy="52" r="5.4"/>
    <circle cx="90" cy="82" r="5.4"/>
  </g>

  <!-- safety-gate badge -->
  <circle cx="60" cy="94" r="15" fill="#052e1b" stroke="#22c55e" stroke-width="2.5"/>
  <path d="M53 94.5 L58 99.5 L68 88" fill="none" stroke="#4ade80" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
